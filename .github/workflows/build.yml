name: Build portable executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build with console visible (for debugging Windows)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.variant }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: AirconektaToolFromNetSphere-linux
            variant: full
          - os: ubuntu-latest
            artifact: AirconektaToolFromNetSphere-linux-light
            variant: light
          - os: windows-latest
            artifact: AirconektaToolFromNetSphere-windows
            variant: full
          - os: windows-latest
            artifact: AirconektaToolFromNetSphere-windows-light
            variant: light
          - os: macos-latest
            artifact: AirconektaToolFromNetSphere-macos
            variant: full
          - os: macos-latest
            artifact: AirconektaToolFromNetSphere-macos-light
            variant: light

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk python3-gi python3-gi-cairo \
            libgtk-3-0 libgl1 libxkbcommon-x11-0 \
            libgirepository-1.0-1 libcairo2 \
            gir1.2-webkit2-4.1 gir1.2-gtk-3.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[build]"

      - name: Build executable
        run: |
          if [ "${{ inputs.debug }}" == "true" ]; then
            DEBUG_FLAG="--debug"
          else
            DEBUG_FLAG=""
          fi
          if [ "${{ matrix.variant }}" == "light" ]; then
            LIGHT_FLAG="--light"
          else
            LIGHT_FLAG=""
          fi
          python build.py $DEBUG_FLAG $LIGHT_FLAG
        shell: bash

      - name: List dist contents
        run: ls -lh dist/
        shell: bash

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          if [ "${{ matrix.variant }}" == "light" ]; then
            mv dist/AirconektaToolFromNetSphere-light.exe dist/${{ matrix.artifact }}.exe
          else
            mv dist/AirconektaToolFromNetSphere.exe dist/${{ matrix.artifact }}.exe
          fi
        shell: bash

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.variant }}" == "light" ]; then
            mv dist/AirconektaToolFromNetSphere-light dist/${{ matrix.artifact }}
          else
            mv dist/AirconektaToolFromNetSphere dist/${{ matrix.artifact }}
          fi
        shell: bash

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.variant }}" == "light" ]; then
            mv dist/AirconektaToolFromNetSphere-light dist/${{ matrix.artifact }}
          else
            mv dist/AirconektaToolFromNetSphere dist/${{ matrix.artifact }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/AirconektaToolFromNetSphere-*

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
